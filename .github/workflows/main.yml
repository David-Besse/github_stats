name: Generate Stats Images

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4.1.6

    - name: Set up Python 3.12
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.12'
        architecture: 'x64'
        cache: 'pip'

    - name: Install requirements
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install -r requirements.txt

    - name: Verify generated directory permissions
      run: |
        mkdir -p generated
        ls -ld generated
        chmod 755 generated
        ls -ld generated

    - name: Validate ACCESS_TOKEN (preflight)
      run: |
        http_code=$(curl -sS -o /tmp/user.json -w "%{http_code}" \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "User-Agent: github-stats-action" \
          https://api.github.com/user)
        if [ "$http_code" != "200" ]; then
          echo "ACCESS_TOKEN preflight failed with HTTP $http_code"
          cat /tmp/user.json
          exit 1
        fi
        echo "ACCESS_TOKEN preflight OK"
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    - name: Generate images
      run: |
        python3 --version
        timeout 10m python3 -u generate_images.py
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EXCLUDED: ${{ secrets.EXCLUDED }}
        EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
        EXCLUDE_FORKED_REPOS: ${{ secrets.EXCLUDE_FORKED_REPOS }}

    - name: Commit to the repo
      run: |
        git config --global user.name "David-Besse/github-stats"
        git config --global user.email "github-stats[bot]@David-Besse"
        git add .
        git commit -m 'Update generated files' || true
        git push
